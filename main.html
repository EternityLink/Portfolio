        <script>
            //popover functionality
            function imageClicked(a) {
                document.getElementById("popover-image").src = a.src;
                popover.showPopover(document.getElementById("popover"));
            };
            popover.onclick = function() {
                popover.hidePopover();
            };

            var sideCard = document.getElementById("sideCard");

            function MoveCard(){
                
                if (sideCard.classList.contains("offset-11")){
                    sideCard.classList.add("offset-7");
                    sideCard.classList.remove("offset-11");
                }
                else{
                    sideCard.classList.add("offset-11");
                    sideCard.classList.remove("offset-7");
                }
            }
        </script>
